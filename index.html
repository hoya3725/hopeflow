<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0050ff">
<link rel="manifest" href="manifest.json">
<title>희망플로우</title>
<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#eef5ff,#dce9ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.wrap{
text-align:center;
padding:20px;
}
img{
width:260px;
border-radius:40px;
box-shadow:0 20px 50px rgba(0,70,255,.15);
}
h1{
font-size:38px;
color:#0050ff;
margin-top:20px;
}
</style>
</head>
<body>
<div class="wrap">
<img src="icon.png">
<h1>희망플로우</h1>
</div>
<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('./service-worker.js');
}
</script>
</body>
</html>
