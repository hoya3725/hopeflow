<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0050ff">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.png">
<title>희망플로우</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  font-family:Arial, "Noto Sans KR", sans-serif;
  background:linear-gradient(135deg,#eef5ff,#dce9ff);
  display:flex;
  align-items:center;
  justify-content:center;
}

.app{
  width:100%;
  height:100%;
  max-width:480px;
  padding:28px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.icon{
  width:min(78vw,340px);
  height:min(78vw,340px);
  border-radius:42px;
  box-shadow:0 22px 55px rgba(0,70,255,.18);
  animation:breathe 5s ease-in-out infinite;
  background:white;
}

@keyframes breathe{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.035)}
}

h1{
  margin-top:32px;
  font-size:42px;
  font-weight:900;
  color:#0050ff;
  letter-spacing:-1px;
}

.sub{
  margin-top:8px;
  font-size:12px;
  letter-spacing:4px;
  color:#6f86a8;
  font-weight:800;
}

.box{
  width:100%;
  margin-top:32px;
  background:white;
  border-radius:28px;
  padding:26px 22px;
  box-shadow:0 10px 26px rgba(0,0,0,.06);
  min-height:118px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#msg{
  font-size:18px;
  font-weight:700;
  line-height:1.65;
  color:#334155;
  transition:.22s;
}

button{
  width:100%;
  height:60px;
  margin-top:20px;
  border:0;
  border-radius:22px;
  background:linear-gradient(135deg,#0050ff,#4b8dff);
  color:white;
  font-size:18px;
  font-weight:900;
  box-shadow:0 12px 25px rgba(0,70,255,.25);
}

button:active{
  transform:scale(.97);
}
</style>
</head>

<body>
<div class="app">
  <img class="icon" src="./icon-512.png" alt="희망플로우">

  <h1>희망플로우</h1>
  <div class="sub">MIND & FLOW SPACE</div>

  <div class="box">
    <div id="msg">화면을 가만히 바라보며 깊게 숨을 들이마시고 내쉬세요.</div>
  </div>

  <button id="btn" type="button">새로운 희망 보기</button>
</div>

<script>
const messages = [
  "당신의 흐름은 멈추지 않습니다.",
  "고요함 속에서 새로운 길이 열립니다.",
  "생각을 잠시 내려놓고 흐름을 느껴보세요.",
  "희망은 아주 작은 숨결에서 시작됩니다.",
  "당신은 다시 일어날 수 있습니다.",
  "평온함은 이미 당신 안에 존재합니다."
];

let i = 0;
const msg = document.getElementById("msg");

document.getElementById("btn").addEventListener("click", () => {
  msg.style.opacity = "0";
  setTimeout(() => {
    i = (i + 1) % messages.length;
    msg.textContent = messages[i];
    msg.style.opacity = "1";
  }, 220);
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js", { scope: "./" });
  });
}
</script>
</body>
</html>
