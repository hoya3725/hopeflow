<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0050ff">
<title>희망FLOW</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#eef5ff,#dce9ff);
overflow:hidden;
}
.wrap{
width:100%;
max-width:430px;
padding:20px;
text-align:center;
}
.logo{
width:280px;
height:280px;
margin:auto;
border-radius:40px;
overflow:hidden;
background:white;
box-shadow:0 20px 50px rgba(0,70,255,.15);
}
.logo img{
width:100%;
height:100%;
object-fit:contain;
animation:breathe 5s ease-in-out infinite;
}
@keyframes breathe{
0%,100%{transform:scale(1)}
50%{transform:scale(1.04)}
}
h1{
margin-top:24px;
font-size:38px;
font-weight:900;
color:#0050ff;
}
.sub{
margin-top:10px;
font-size:12px;
letter-spacing:4px;
color:#718096;
}
.box{
margin-top:28px;
background:white;
padding:26px;
border-radius:28px;
min-height:120px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 8px 20px rgba(0,0,0,.05);
}
#msg{
font-size:18px;
line-height:1.7;
color:#334155;
transition:.25s;
}
button{
margin-top:20px;
width:100%;
height:60px;
border:none;
border-radius:22px;
background:linear-gradient(135deg,#0050ff,#4b8dff);
color:white;
font-size:18px;
font-weight:900;
box-shadow:0 12px 25px rgba(0,70,255,.22);
}
button:active{
transform:scale(.97);
}
</style>
</head>
<body>

<div class="wrap">

<div class="logo">
<img src="icon.png">
</div>

<h1>희망FLOW</h1>
<div class="sub">MIND & FLOW SPACE</div>

<div class="box">
<div id="msg">화면을 가만히 바라보며 깊게 숨을 들이마시고 내쉬세요.</div>
</div>

<button onclick="nextMessage()">새로운 희망 다지기</button>

</div>

<script>
const messages = [
"당신의 흐름은 멈추지 않습니다.",
"고요함 속에서 새로운 길이 열립니다.",
"생각을 잠시 내려놓고 흐름을 느껴보세요.",
"희망은 아주 작은 숨결에서 시작됩니다.",
"당신은 다시 일어날 수 있습니다."
];

let i = 0;

function nextMessage(){
const m = document.getElementById("msg");
m.style.opacity = "0";

setTimeout(()=>{
i = (i + 1) % messages.length;
m.innerText = messages[i];
m.style.opacity = "1";
},250);
}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
